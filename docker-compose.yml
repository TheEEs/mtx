services:
  mediamtx:
    build: 
      context: ./mediamtx
      dockerfile: Dockerfile.mediamtx
    restart: unless-stopped
    ports:
      - 8890:8890/udp
      - 8189:8189/udp
    networks:
      - mtx
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro

  caddy:
    build: 
      context: ./caddy
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mtx
    env_file:
      - caddy/.env

  app:
    extends:
      file: "./admin/.devcontainer/compose.yaml"
      service: app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  mtx:
    name: mtx
